<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="keywords" content="{{ page.keywords | default: 'Forex trading, Gold trading, XAUUSD, copy trading, LiteFinance, RoboForex, low risk trading, cents accounts, automated trading, gold scalper' }}">
<meta name="author" content="{{ site.author }}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ site.url }}{{ page.url }}">

{% include gtm-head.html %}
{% include analytics.html %}

<!-- Open Graph tags -->
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ site.url }}/assets/images/goldcopytrading-logo.png">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
